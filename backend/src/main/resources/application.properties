spring.application.name=pos-backend
server.port=8080

# Database - use environment variables for prod
spring.datasource.url=${DATABASE_URL:jdbc:h2:mem:posdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=${DB_DRIVER:org.h2.Driver}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Defer datasource initialization so JPA creates tables before data.sql runs
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always
